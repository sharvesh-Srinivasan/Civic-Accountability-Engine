<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c6ef5"/>
      <stop offset="100%" stop-color="#7950f2"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#grad)"/>

  <!-- Shield body -->
  <path
    d="M16 5 L7 8.5 L7 15.5 C7 20.8 11 25.4 16 27 C21 25.4 25 20.8 25 15.5 L25 8.5 Z"
    fill="white"
    fill-opacity="0.92"
  />

  <!-- Map pin inside shield -->
  <!-- Pin head circle -->
  <circle cx="16" cy="14" r="3" fill="#4c6ef5"/>
  <!-- Inner dot -->
  <circle cx="16" cy="14" r="1.2" fill="white"/>
  <!-- Pin tail (teardrop point) -->
  <path d="M14.2 16.2 Q16 19.5 16 20 Q16 19.5 17.8 16.2" fill="#4c6ef5"/>
</svg>
